name: tourguide_app
description: "NileTech Tour Guide - Professional mobile application for Tour Guides."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management (Cubit as ViewModel)
  flutter_bloc: ^8.1.6

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Service Locator
  get_it: ^8.0.3

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.6.2

  # UI Helpers
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
