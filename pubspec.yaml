name: tourguide_app
description: "NileTech Tour Guide - Professional mobile application for Tour Guides."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management (Cubit as ViewModel)
  flutter_bloc: ^8.1.6

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Service Locator
  get_it: ^8.0.3

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.6.2

  # Media
  video_player: ^2.9.2

  # UI Helpers
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17

  # Cache
  shared_preferences: ^2.3.2

  # Background sync & local notifications
  workmanager: ^0.9.0+3
  flutter_local_notifications: ^18.0.1

  # External links
  url_launcher: ^6.3.0

  # Utils
  intl: ^0.19.0
  connectivity_plus: ^6.1.1
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

